version: "3.8"

services:
  # Active STT runtime until Speaches parity is validated.
  whisper-stt:
    image: fedirz/faster-whisper-server:latest-cuda
    ports:
      - "9000:8000"
    environment:
      - DEFAULT_MODEL=Systran/faster-distil-whisper-large-v3
    volumes:
      - whisper_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Validation sidecar for the maintained STT runtime.
  speaches-stt:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda
    ports:
      - "9001:8000"
    environment:
      - ENABLE_UI=false
      - LOG_LEVEL=info
      - WHISPER__MODEL=Systran/faster-distil-whisper-large-v3
      - PRELOAD_MODELS=["Systran/faster-distil-whisper-large-v3"]
    volumes:
      - speaches_cache:/home/ubuntu/.cache/huggingface/hub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Text-to-Speech: Kokoro-FastAPI (OpenAI-compatible API)
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:v0.5.0
    ports:
      - "8880:8880"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Vector database for document search
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

volumes:
  whisper_cache:
  speaches_cache:
  chroma_data:

# NOTE: Ollama runs natively (not in Docker) for best GPU perf on GB10
# Start with: systemctl restart ollama
# Pull model: ollama pull qwen2.5:14b
